<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart - Scoops & Co.</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <nav>
      <a href="index.html" class="logo"><span>&#127846;</span> Scoops &amp; Co.</a>
      <button class="nav-toggle" aria-label="Toggle menu">&#9776;</button>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="cart.html" class="cart-link active">Cart <span class="cart-count"></span></a></li>
        <li><a href="login.html" class="auth-link">Sign In</a></li>
      </ul>
    </nav>
  </header>

  <section class="section">
    <h2 class="section-title">Your Cart</h2>
    <p class="section-subtitle" id="cart-subtitle"></p>

    <div id="cart-content"></div>
  </section>

  <footer>
    <ul class="footer-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="login.html">Account</a></li>
    </ul>
    <p>&copy; 2026 Scoops &amp; Co. All rights reserved. A demo site.</p>
  </footer>

  <script src="js/app.js"></script>
  <script src="js/tracking.js"></script>
  <script
    src="https://embeddables.p.mbirdcdn.net/sdk/v0/bird-sdk.js"
    data-config-url="https://api.bird.com/workspaces/d9823d98-f98b-4c95-9e71-d9640c620d65/applications/c8b2d279-bd80-4b46-a5a7-1e5964c34867/signature/2024-06-17T17-12-51_27fb6117c2"
  ></script>
  <script>
    function renderCart() {
      const cart = getCart();
      const container = document.getElementById('cart-content');
      const subtitle = document.getElementById('cart-subtitle');

      if (cart.length === 0) {
        subtitle.textContent = '';
        container.innerHTML = `
          <div class="cart-empty">
            <div class="empty-icon">&#128722;</div>
            <h3>Your cart is empty</h3>
            <p>Looks like you haven't added any flavors yet.</p>
            <a href="shop.html" class="btn btn-primary" style="margin-top: 1rem;">Browse Flavors</a>
          </div>
        `;
        return;
      }

      const count = getCartItemCount();
      subtitle.textContent = `${count} item${count === 1 ? '' : 's'} in your cart.`;

      const itemsHTML = cart.map(item => `
        <div class="cart-item">
          <div class="item-icon">${item.emoji}</div>
          <div class="item-details">
            <h3>${item.name}</h3>
            <span class="item-price">$${item.price.toFixed(2)} each</span>
          </div>
          <div class="item-qty">
            <button onclick="updateQty('${item.id}', -1)" aria-label="Decrease quantity">&minus;</button>
            <span>${item.qty}</span>
            <button onclick="updateQty('${item.id}', 1)" aria-label="Increase quantity">+</button>
          </div>
          <div class="item-total">$${(item.price * item.qty).toFixed(2)}</div>
          <button class="item-remove" onclick="removeFromCart('${item.id}')" aria-label="Remove item">&times;</button>
        </div>
      `).join('');

      const subtotal = getCartTotal();
      const tax = subtotal * 0.08;
      const total = subtotal + tax;

      container.innerHTML = `
        <div class="cart-items">${itemsHTML}</div>
        <div class="cart-summary">
          <div class="summary-row"><span>Subtotal</span><span>$${subtotal.toFixed(2)}</span></div>
          <div class="summary-row"><span>Tax (8%)</span><span>$${tax.toFixed(2)}</span></div>
          <div class="summary-row total"><span>Total</span><span>$${total.toFixed(2)}</span></div>
          <a href="checkout.html" class="btn btn-primary" style="width: 100%; text-align: center; margin-top: 1rem;">Proceed to Checkout</a>
        </div>
      `;
    }

    renderCart();
  </script>
</body>
</html>
